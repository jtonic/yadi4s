<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>yadi4s — TypeSafe DI DSL in Scala 3</title>
        <link rel="stylesheet" href="node_modules/reveal.js/dist/reveal.css" />
        <link rel="stylesheet" href="node_modules/reveal.js/dist/theme/black.css" id="theme" />
        <link rel="stylesheet" href="node_modules/reveal.js/dist/plugin/highlight/monokai.css" />
        <style>
            body,
            .reveal {
                background: radial-gradient(circle at 50% 50%, #0d2b4a 0%, #0a1628 70%);
                background-attachment: fixed;
                min-height: 100vh;
            }
            .reveal .slides section {
                text-align: left;
            }
            .reveal .slides section h1,
            .reveal .slides section h2,
            .reveal .slides section h3,
            .reveal .slides section h4 {
                text-align: left;
            }
            .reveal .slides section h1,
            .reveal .slides section h2,
            .reveal .slides section h3,
            .reveal .slides section h4 {
                text-transform: none;
            }
            .reveal .slides section h2 {
                margin-bottom: 0.6em;
                color: #42a5f5;
                border-left: 4px solid #42a5f5;
                padding-left: 0.4em;
                border-bottom: 1px solid rgba(66, 165, 245, 0.15);
                padding-bottom: 0.2em;
            }
            .reveal .slides section h3 {
                margin-bottom: 0.5em;
                color: #26c6da;
                border-left: 3px solid #26c6da;
                padding-left: 0.4em;
            }
            .reveal .slides section h4 {
                margin-bottom: 0.4em;
                color: #4db6ac;
                border-left: 2px solid #4db6ac;
                padding-left: 0.4em;
            }
            .reveal strong {
                color: #42a5f5;
            }
            .reveal em {
                color: #ff00ff;
                font-size: 0.8em;
            }
            .reveal pre { font-size: 0.7em; }
            .reveal table { font-size: 0.7em; border-radius: 8px; overflow: hidden; background: rgba(13, 43, 74, 0.6) !important; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); width: 96%; margin: 0 auto; }
            .reveal table th,
            .reveal table td { background: transparent !important; }
            .reveal table th { background: rgba(0, 0, 0, 0.25) !important; }
            .reveal pre { border-radius: 8px; overflow: auto; background: rgba(13, 43, 74, 0.6) !important; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); scrollbar-color: rgba(13, 43, 74, 0.8) transparent; margin-left: 0; padding-left: 0.6em; }
            .reveal pre::-webkit-scrollbar { width: 6px; height: 6px; }
            .reveal pre::-webkit-scrollbar-track { background: transparent; }
            .reveal pre::-webkit-scrollbar-thumb { background: rgba(13, 43, 74, 0.8); border-radius: 3px; }
            .reveal pre code { border-radius: 8px; background: transparent !important; padding-left: 0.6em; }
            .reveal li { font-size: 0.8em; margin-bottom: 0.5em; }
            .reveal .slides .center-slide,
            .reveal .slides .center-slide h1,
            .reveal .slides .center-slide h2,
            .reveal .slides .center-slide h3 { text-align: center !important; }
            .reveal code {
                font-size: 0.8em;
            }
            .reveal img {
                max-width: 65%;
                height: auto;
                display: block;
                margin-left: auto;
                margin-right: auto;
            }
        </style>
    </head>
    <body>
        <div class="reveal">
            <div class="slides">
                <section data-markdown="yadi4s.md" data-separator="^---$" data-separator-vertical="^----$" data-charset="utf-8"></section>
            </div>
        </div>
        <script src="node_modules/reveal.js/dist/reveal.js"></script>
        <script src="node_modules/reveal.js/dist/plugin/markdown.js"></script>
        <script src="node_modules/reveal.js/dist/plugin/highlight.js"></script>
        <script src="node_modules/reveal.js/dist/plugin/notes.js"></script>
        <script>
            Reveal.initialize({
                plugins: [RevealMarkdown, RevealHighlight, RevealNotes],
                hash: true,
                width: "100%",
                height: "100%",
                margin: 0.1,
                minScale: 1,
                maxScale: 1,
            });
            Reveal.on("ready", () => {
                document.querySelectorAll(".slides li").forEach((li) => li.classList.add("fragment"));
            });
        </script>
    </body>
</html>
